name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # Fail fast on the first matrix failure so a broken build doesn't
      # burn CI minutes on the other Python versions.
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        env:
          # CI runs with a known dummy secret. The application reads
          # SECRET_KEY / DEBUG from the environment (see config/settings.py).
          # DEBUG is left True (the default) for tests: the production
          # security hardening in config/settings.py activates
          # SECURE_SSL_REDIRECT when DEBUG is off, which makes the
          # Django test client (which speaks plain HTTP) 301-redirect
          # to https and lose POST bodies. Tests should never run under
          # production-mode security middleware.
          SECRET_KEY: ci-only-not-a-real-secret
          ALLOWED_HOSTS: "*"
        run: python manage.py test
