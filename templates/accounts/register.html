{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<section class="card narrow">
  <h1>Create an account</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Register</button>
  </form>
  <p class="muted">Already have an account? <a href="{% url 'login' %}">Log in</a>.</p>
</section>
{% endblock %}
