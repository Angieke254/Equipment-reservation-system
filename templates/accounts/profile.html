{% extends "base.html" %}
{% block title %}My profile{% endblock %}

{% block content %}
<section class="card narrow">
  <h1>{{ user.username }}{% if user.is_admin %} <span class="badge badge-admin">admin</span>{% endif %}</h1>
  <p class="muted">Joined {{ user.date_joined|date:"M j, Y" }} &middot; <a href="{% url 'my_history' %}">View borrowing history</a></p>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save changes</button>
  </form>
</section>
{% endblock %}
